name: Quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: card_generator
          POSTGRES_USER: card_generator
          POSTGRES_PASSWORD: card_generator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U card_generator -d card_generator"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: false
      POSTGRES_DB: card_generator
      POSTGRES_USER: card_generator
      POSTGRES_PASSWORD: card_generator
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync

      - name: Format
        run: ./scripts/format

      - name: Check formatting diff
        run: git diff --exit-code

      - name: Lint
        run: ./scripts/lint

      - name: Test
        run: ./scripts/test
